    <!-- 3. Connect to your Supabase project -->
    <script>
        // Go to Supabase Project Settings -> API to find these keys
        const SUPABASE_URL = 'https://prticootpxkzxsoucxsu.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_DWVPHjpoAd8Z_O-6Cyzygg_ZJyBpBe-';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 4. Run the official Apple OAuth script when clicked
        async function loginWithApple() {
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'apple',
                options: {
                    // Where to send the user after they successfully login
                    redirectTo: window.location.origin + '/dashboard.html' 
                }
            });

            if (error) {
                alert("Login Error: " + error.message);
            }
        }
    </script>
