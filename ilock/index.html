<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erişim Engellendi</title>
   <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>

    <script src="/authuser/authenticate"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fb;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 100%;
        }

        .icon-container {
            margin-bottom: 24px;
        }

        .lock-icon {
            width: 80px;
            height: 80px;
            background: #ffebeb;
            fill: #e53e3e;
            padding: 18px;
            border-radius: 50%;
            display: inline-block;
        }

        h1 {
            font-size: 24px;
            color: #2d3748;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            font-size: 15px;
            color: #718096;
            line-height: 1.6;
            margin-bottom: 26px;
        }

        .btn {
            display: inline-block;
            background-color: #4f46e5;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #4338ca;
        }

        .error-code {
            margin-top: 30px;
            font-size: 12px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon-container">
        <svg class="lock-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
        </svg>
    </div>

    <h1>Erişim Engellendi</h1>
    <p>Bu Iphone Sahibi tarafından Engellenmiştir, Kiliti Açmak için Face ID ya da Özel Denetimli erişim Parolanızı kullanın</p>
    
    <a href="javascript:authenticate();" class="btn">Face ID Kullan</a>

    <div class="error-code">Apple</div>
</div>

</body>
</html>
