    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a252c;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        #gameWrapper {
            position: relative;
            width: 400px;
            height: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 20px;
            overflow: hidden;
            border: 4px solid #fff;
        }

        canvas {
            display: block;
        }

        /* Ortak Arayüz Stilleri */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 20;
            transition: opacity 0.3s;
        }

        .screen.hidden {
            display: none;
            opacity: 0;
            pointer-events: none;
        }

        .panel {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            border: 4px solid #fff;
            width: 70%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 42px;
            text-transform: uppercase;
            text-shadow: 3px 3px 0 #d35400;
            font-weight: 900;
        }

        p {
            color: #fff;
            font-size: 18px;
            margin: 5px 0 20px 0;
            font-weight: 700;
            text-shadow: 1px 1px 0 #d35400;
        }

        .score-box {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
        }

        .score-box div {
            font-size: 20px;
            color: #fff;
            margin: 5px 0;
        }

        .score-box span {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
        }

        button {
            background: #2ecc71;
            color: white;
            border: 3px solid #fff;
            padding: 12px 30px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
        }

        button:hover {
            background: #27ae60;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(2px);
        }

        /* Oyun İçi Skor Tabelası */
        #hudScore {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 50px;
            color: white;
            font-weight: 900;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            pointer-events: none;
            z-index: 10;
        }

<body>

    <div id="gameWrapper">
        <div id="hudScore" class="hidden">0</div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <!-- Giriş Ekranı -->
        <div id="startScreen" class="screen">
            <div class="panel">
                <h1>ZıpZıp</h1>
                <p>Uçmak için Tıkla veya Boşluk Tuşuna Bas</p>
                <button id="startBtn">Oyuna Başla</button>
            </div>
        </div>

        <!-- Oyun Bitti Ekranı -->
        <div id="gameOverScreen" class="screen hidden">
            <div class="panel">
                <h1>Oyun Bitti!</h1>
                <div class="score-box">
                    <div>Skor: <br><span id="finalScore">0</span></div>
                    <div>En Yüksek: <br><span id="highScore">0</span></div>
                </div>
                <button id="restartBtn">Tekrar Oyna</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // UI Elementleri
        const hudScore = document.getElementById("hudScore");
        const startScreen = document.getElementById("startScreen");
        const gameOverScreen = document.getElementById("gameOverScreen");
        const finalScoreEl = document.getElementById("finalScore");
        const highScoreEl = document.getElementById("highScore");
        const startBtn = document.getElementById("startBtn");
        const restartBtn = document.getElementById("restartBtn");

        // Oyun Değişkenleri
        let frames = 0;
        let score = 0;
        let bestScore = localStorage.getItem("zipzipHighScore") || 0;
        
        // State: 0 = Start, 1 = Playing, 2 = Game Over
        let gameState = 0; 
        let animationId;

        // Daha rahat oynanış için ayarlar
        const GRAVITY = 0.20; // Düşüş hızı yavaşlatıldı (Eski: 0.35)
        const JUMP = -5.0;    // Zıplama gücü dengelendi
        const SPEED = 2;      // Oyun akış hızı
        const PIPE_GAP = 160; // Boru aralığı genişletildi (Eski: 140)

        // Kuş (ZıpZıp) Objesi
        const bird = {
            x: 80,
            y: 250,
            radius: 14,
            velocity: 0,
            rotation: 0,
            wingY: 0,
            wingDirection: 1,
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Hıza göre rotasyon (Burnu havaya veya yere dönük)
                this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.velocity * 0.1)));
                ctx.rotate(this.rotation);

                // Gövde
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#ffeb3b"; // Sarı
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#000";
                ctx.stroke();

                // Göz
                ctx.beginPath();
                ctx.arc(6, -5, 4, 0, Math.PI * 2);
                ctx.fillStyle = "white";
                ctx.fill();
                ctx.stroke();
                
                // Göz bebeği
                ctx.beginPath();
                ctx.arc(7, -5, 2, 0, Math.PI * 2);
                ctx.fillStyle = "black";
                ctx.fill();

                // Gaga
                ctx.beginPath();
                ctx.moveTo(12, 0);
                ctx.lineTo(22, 3);
                ctx.lineTo(12, 6);
                ctx.fillStyle = "#e67e22";
                ctx.fill();
                ctx.stroke();

                // Kanat (Hareketli)
                ctx.beginPath();
                ctx.ellipse(-4, 2 + this.wingY, 8, 5, 0, 0, Math.PI * 2);
                ctx.fillStyle = "#f1c40f";
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            },
            
            update() {
                // Kanat çırpma animasyonu
                if (frames % 5 === 0) {
                    this.wingY += this.wingDirection * 3;
                    if (this.wingY > 3 || this.wingY < -3) this.wingDirection *= -1;
                }

                if (gameState === 1) {
                    this.velocity += GRAVITY;
                    this.y += this.velocity;

                    // Yere çarpma
                    if (this.y + this.radius >= canvas.height - ground.height) {
                        this.y = canvas.height - ground.height - this.radius;
                        triggerGameOver();
                    }
                    // Tavana çarpma (Zıplamayı kes, hemen ölmesin)
                    if (this.y - this.radius <= 0) {
                        this.y = this.radius;
                        this.velocity = 0;
                    }
                } else if (gameState === 0) {
                    // Giriş ekranında hafifçe süzülme efekti
                    this.y = 250 + Math.cos(frames / 15) * 10;
                }
            },
            
            flap() {
                this.velocity = JUMP;
            }
        };

        // Borular Objesi
        const pipes = {
            array: [],
            width: 60,
            
            draw() {
                for (let i = 0; i < this.array.length; i++) {
                    let p = this.array[i];
                    
                    ctx.fillStyle = "#73bf2e"; // Açık yeşil
                    ctx.strokeStyle = "#558b22"; // Koyu yeşil çerçeve
                    ctx.lineWidth = 3;

                    // Üst Boru
                    ctx.fillRect(p.x, 0, this.width, p.top);
                    ctx.strokeRect(p.x, 0, this.width, p.top);
                    // Üst Boru Şapkası
                    ctx.fillRect(p.x - 4, p.top - 20, this.width + 8, 20);
                    ctx.strokeRect(p.x - 4, p.top - 20, this.width + 8, 20);
                    
                    // Alt Boru
                    ctx.fillRect(p.x, canvas.height - ground.height - p.bottom, this.width, p.bottom);
                    ctx.strokeRect(p.x, canvas.height - ground.height - p.bottom, this.width, p.bottom);
                    // Alt Boru Şapkası
                    ctx.fillRect(p.x - 4, canvas.height - ground.height - p.bottom, this.width + 8, 20);
                    ctx.strokeRect(p.x - 4, canvas.height - ground.height - p.bottom, this.width + 8, 20);
                }
            },
            
            update() {
                if (gameState !== 1) return;

                // Her 120 karede bir boru üret (Daha rahat mesafe)
                if (frames % 120 === 0) {
                    let minHeight = 60;
                    let maxHeight = canvas.height - ground.height - PIPE_GAP - minHeight;
                    let topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
                    let bottomHeight = canvas.height - ground.height - (topHeight + PIPE_GAP);
                    
                    this.array.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: bottomHeight,
                        passed: false
                    });
                }
                
                for (let i = 0; i < this.array.length; i++) {
                    let p = this.array[i];
                    p.x -= SPEED;

                    // Çarpışma Kontrolü (Hitbox biraz küçültüldü - Affedici)
                    let collisionRadius = bird.radius - 3;
                    if (
                        bird.x + collisionRadius > p.x && 
                        bird.x - collisionRadius < p.x + this.width &&
                        (bird.y - collisionRadius < p.top || bird.y + collisionRadius > canvas.height - ground.height - p.bottom)
                    ) {
                        triggerGameOver();
                    }

                    // Skor
                    if (p.x + this.width < bird.x && !p.passed) {
                        score++;
                        p.passed = true;
                        hudScore.innerText = score;
                    }

                    // Ekrandan çıkanları sil
                    if (p.x + this.width + 10 < 0) {
                        this.array.shift();
                        i--;
                    }
                }
            }
        };

        // Arka Plan ve Zemin
        const background = {
            draw() {
                // Gökyüzü Gradient
                let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, "#4ec0ca"); // Üst mavi
                gradient.addColorStop(1, "#b4e0e5"); // Alt açık mavi
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Arka plan bulut/şehir silueti eklenebilir (Basit tutuldu)
            }
        };

        const ground = {
            x: 0,
            height: 40,
            draw() {
                ctx.fillStyle = "#ded895";
                ctx.fillRect(0, canvas.height - this.height, canvas.width, this.height);
                
                // Zemin çizgileri (Hareket hissi için)
                ctx.fillStyle = "#c5b868";
                for (let i = 0; i < canvas.width * 2; i += 30) {
                    ctx.fillRect(this.x + i, canvas.height - this.height + 5, 20, 5);
                }
                
                // Çimen şeridi
                ctx.fillStyle = "#73bf2e";
                ctx.fillRect(0, canvas.height - this.height, canvas.width, 8);
                ctx.strokeStyle = "#558b22";
                ctx.beginPath();
                ctx.moveTo(0, canvas.height - this.height);
                ctx.lineTo(canvas.width, canvas.height - this.height);
                ctx.stroke();
            },
            update() {
                if (gameState === 1 || gameState === 0) {
                    this.x -= SPEED;
                    if (this.x <= -30) {
                        this.x = 0;
                    }
                }
            }
        };

        // Temel Döngü
        function draw() {
            background.draw();
            pipes.draw();
            ground.draw();
            bird.draw();
        }

        function update() {
            bird.update();
            ground.update();
            pipes.update();
        }

        function loop() {
            update();
            draw();
            frames++;
            animationId = requestAnimationFrame(loop);
        }

        // Oyun Kontrol Fonksiyonları
        function startGame() {
            gameState = 1;
            startScreen.classList.add("hidden");
            hudScore.classList.remove("hidden");
            hudScore.innerText = "0";
            bird.flap();
        }

        function triggerGameOver() {
            gameState = 2;
            hudScore.classList.add("hidden");
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem("zipzipHighScore", bestScore);
            }
            
            finalScoreEl.innerText = score;
            highScoreEl.innerText = bestScore;
            
            setTimeout(() => {
                gameOverScreen.classList.remove("hidden");
            }, 300); // Küçük bir gecikme ile ekranı göster
        }

        function resetGame() {
            bird.y = 250;
            bird.velocity = 0;
            bird.rotation = 0;
            pipes.array = [];
            score = 0;
            frames = 0;
            
            gameOverScreen.classList.add("hidden");
            startGame();
        }

        // Event Listeners (Tıklama ve Tuşlar)
        function handleInput() {
            if (gameState === 0) {
                // Giriş ekranında başla
            } else if (gameState === 1) {
                bird.flap(); // Oynarken zıpla
            }
        }

        startBtn.addEventListener("click", startGame);
        restartBtn.addEventListener("click", resetGame);

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space" || e.code === "ArrowUp") {
                if (gameState === 0) startGame();
                else if (gameState === 1) bird.flap();
                else if (gameState === 2) resetGame(); // Öldüyse space ile yeniden başla
            }
        });

        canvas.addEventListener("mousedown", handleInput);
        canvas.addEventListener("touchstart", (e) => {
            e.preventDefault(); // Ekranda kaymayı engelle
            handleInput();
        }, {passive: false});

        // Başlangıç
        loop();
    </script>
</body>
