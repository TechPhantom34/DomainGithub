<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZıpZıp</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
        }

        /* Oyun ekranı */
        canvas {
            background-color: #70c5ce; /* Gökyüzü rengi */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
            display: block;
            border: 4px solid #fff;
        }

        /* Skor tabelası */
        #scoreBoard {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 40px;
            color: white;
            font-weight: bold;
            text-shadow: 3px 3px 0 #000;
            pointer-events: none;
            z-index: 10;
        }

        /* Oyun bitti ekranı */
        #ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            display: none;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 20;
            width: 80%;
        }

        #ui h1 {
            margin-top: 0;
            color: #ffeb3b;
            font-size: 32px;
        }

        #ui p {
            font-size: 24px;
            margin: 15px 0;
        }

        button {
            padding: 12px 25px;
            font-size: 20px;
            cursor: pointer;
            background: #2ecc71;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #27ae60;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <div id="scoreBoard">0</div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div id="ui">
            <h1>Oyun Bitti!</h1>
            <p>Skorun: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Tekrar Oyna</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreBoard");
        const ui = document.getElementById("ui");
        const finalScoreElement = document.getElementById("finalScore");

        let frames = 0;
        let score = 0;
        let gameOver = false;

        // ZıpZıp (Kuş) Objesi
        const zipzip = {
            x: 60,
            y: 150,
            radius: 14,
            velocity: 0,
            gravity: 0.35,
            jump: -6.5,
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#ffeb3b"; // Sarı renk
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#333";
                ctx.stroke();
                ctx.closePath();

                // Göz çizimi
                ctx.beginPath();
                ctx.arc(this.x + 5, this.y - 5, 3, 0, Math.PI * 2);
                ctx.fillStyle = "black";
                ctx.fill();
                ctx.closePath();
            },
            
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;

                // Yere çarpma kontrolü
                if (this.y + this.radius >= canvas.height) {
                    this.y = canvas.height - this.radius;
                    gameOver = true;
                }
                // Tavana çarpma kontrolü
                if (this.y - this.radius <= 0) {
                    this.y = this.radius;
                    this.velocity = 0;
                }
            },
            
            flap() {
                this.velocity = this.jump;
            }
        };

        // Borular Objesi
        const pipes = {
            array: [],
            width: 60,
            gap: 140, // Borular arası boşluk
            dx: 2.5,  // Boru ilerleme hızı
            
            draw() {
                for (let i = 0; i < this.array.length; i++) {
                    let p = this.array[i];
                    
                    ctx.fillStyle = "#2ecc71"; // Yeşil borular
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = "#000";

                    // Üst boru
                    ctx.fillRect(p.x, 0, this.width, p.top);
                    ctx.strokeRect(p.x, 0, this.width, p.top);
                    
                    // Alt boru
                    ctx.fillRect(p.x, canvas.height - p.bottom, this.width, p.bottom);
                    ctx.strokeRect(p.x, canvas.height - p.bottom, this.width, p.bottom);
                }
            },
            
            update() {
                // Her 100 karede bir yeni boru üret
                if (frames % 100 === 0) {
                    // Boruların yüksekliğini rastgele ayarla
                    let minHeight = 50;
                    let maxHeight = canvas.height - this.gap - minHeight;
                    let topHeight = Math.random() * (maxHeight - minHeight) + minHeight;
                    let bottomHeight = canvas.height - (topHeight + this.gap);
                    
                    this.array.push({
                        x: canvas.width,
                        top: topHeight,
                        bottom: bottomHeight,
                        passed: false
                    });
                }
                
                for (let i = 0; i < this.array.length; i++) {
                    let p = this.array[i];
                    p.x -= this.dx;

                    // Çarpışma Kontrolü
                    if (
                        zipzip.x + zipzip.radius > p.x && 
                        zipzip.x - zipzip.radius < p.x + this.width &&
                        (zipzip.y - zipzip.radius < p.top || zipzip.y + zipzip.radius > canvas.height - p.bottom)
                    ) {
                        gameOver = true;
                    }

                    // Skor Kontrolü (Boru geçildiğinde)
                    if (p.x + this.width < zipzip.x && !p.passed) {
                        score++;
                        p.passed = true;
                        scoreElement.innerText = score;
                    }

                    // Ekrandan çıkan boruları sil
                    if (p.x + this.width < 0) {
                        this.array.shift();
                        i--;
                    }
                }
            }
        };

        // Zemin efekti (Opsiyonel basit çizimler)
        function drawBackground() {
            ctx.fillStyle = "#ded895"; // Kum rengi zemin şeridi
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
        }

        // Çizim fonksiyonu
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Ekranı temizle
            drawBackground();
            zipzip.draw();
            pipes.draw();
        }

        // Güncelleme fonksiyonu
        function update() {
            zipzip.update();
            pipes.update();
        }

        // Oyun Döngüsü
        function loop() {
            if (gameOver) {
                ui.style.display = "block";
                finalScoreElement.innerText = score;
                return;
            }
            
            update();
            draw();
            frames++;
            requestAnimationFrame(loop); // Sürekli tekrarla
        }

        // Oyunu Sıfırlama
        function resetGame() {
            zipzip.y = 150;
            zipzip.velocity = 0;
            pipes.array = [];
            score = 0;
            frames = 0;
            gameOver = false;
            scoreElement.innerText = score;
            ui.style.display = "none";
            loop();
        }

        // Kontroller (Boşluk tuşu, Yukarı Ok veya Fare Tıklaması)
        document.addEventListener("keydown", function(e) {
            if (e.code === "Space" || e.code === "ArrowUp") {
                if (!gameOver) zipzip.flap();
            }
        });
        
        canvas.addEventListener("mousedown", function() {
            if (!gameOver) zipzip.flap();
        });

        // Oyunu Başlat
        loop();
    </script>
</body>
</html>
